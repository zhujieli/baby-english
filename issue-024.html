<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>宝宝英语启蒙 · 第024期</title>
<style>
:root{--p:#FF9B50;--pd:#E07A2F;--s:#7EC8E3;--sd:#4AABBF;--bg:#FFF9F0;--t:#3D3D3D;--tl:#7A7A7A}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--t);line-height:1.75;padding-bottom:80px}
.tts-btn{display:inline-flex;align-items:center;gap:4px;background:#FFF3E0;border:1.5px solid #FFE0B2;border-radius:20px;padding:3px 10px 3px 6px;font-size:12px;color:var(--pd);cursor:pointer;font-weight:600;margin-left:4px;vertical-align:middle;transition:all .2s}
.tts-btn:active{background:var(--p);color:#fff;border-color:var(--p);transform:scale(0.95)}
.tts-btn.playing{background:#FF5722;color:#fff;animation:pulse .6s infinite}
.play-btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FF9B50,#FF6B35);color:#fff;border:none;border-radius:12px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(255,107,53,.3)}
.play-btn:active{transform:scale(0.96)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.hero{background:linear-gradient(135deg,#FFE0B2 0%,#B3E5FC 100%);padding:44px 24px 36px;text-align:center}
.hero::after{content:'';display:block;height:30px;background:var(--bg);border-radius:50% 50% 0 0;margin:20px -24px -36px}
.hero-badge{display:inline-block;background:var(--p);color:#fff;font-size:12px;font-weight:700;padding:4px 16px;border-radius:20px;margin-bottom:14px}
.hero h1{font-size:28px;font-weight:800;color:#2C2C2C;margin-bottom:6px}
.hero-sub{font-size:14px;color:#6D4C41;margin-bottom:4px}
.hero-meta{display:flex;justify-content:center;gap:16px;margin-top:12px;font-size:12px;color:#795548}
.hero-meta span{background:rgba(255,255,255,.6);padding:3px 10px;border-radius:12px}
.nav-tabs{display:flex;gap:6px;padding:20px 16px 6px;overflow-x:auto}
.nav-tab{flex-shrink:0;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid #F0E8DC;background:#FFF;cursor:pointer}
.nav-tab.active{background:var(--p);color:#fff;border-color:var(--p)}
.card{background:#FFF;border-radius:18px;margin:16px;padding:20px;box-shadow:0 2px 14px rgba(255,155,80,.12)}
.intro-box{background:linear-gradient(135deg,#FFF3E0,#E8F5E9);border-left:4px solid var(--p);border-radius:16px;margin:20px 16px 4px;padding:16px 18px;font-size:14.5px;line-height:1.8}
.section-title{font-size:17px;font-weight:800;color:#2C2C2C;margin-bottom:14px}
.sentence-item{background:#FAFAFA;border-radius:14px;padding:16px;margin-bottom:12px;border-left:4px solid var(--s)}
.sentence-item:last-child{margin-bottom:0}
.sentence-en{font-size:18px;font-weight:700;color:#2C2C2C;margin-bottom:6px;line-height:1.4}
.sentence-zh{font-size:13px;color:#795548;margin-bottom:8px}
.sentence-tip{background:#FFF3E0;border-radius:10px;padding:10px 12px;font-size:13px;color:#E65100;line-height:1.6}
.song-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dashed #C8E6C9;gap:12px}
.song-item:last-child{border-bottom:none}
.song-en{font-size:16px;font-weight:600;color:#1B5E20}
.song-zh{font-size:12px;color:#689F38;margin-top:2px}
.story-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #FFE082}
.story-en{font-size:15px;font-weight:700;color:#BF360C}
.story-zh{font-size:12px;color:#795548}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #BBDEFB}
.activity-num{width:28px;height:28px;background:#7EC8E3;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.activity-title{font-size:14px;font-weight:700;color:#1565C0;margin-bottom:4px}
.activity-desc{font-size:13px;color:#1976D2}
.tip-item{background:#FFF3E0;border-radius:10px;padding:12px 14px;font-size:14px;color:#E65100;line-height:1.7;margin-bottom:10px}
.tip-item:last-child{margin-bottom:0}
.alpha-box{background:linear-gradient(135deg,#F3E5F5,#EDE7F6);border-radius:18px;margin:16px;padding:24px;text-align:center}
.alpha-letter{font-size:80px;font-weight:900;color:#6A1B9A}
.alpha-info{font-size:14px;color:#7B1FA2;margin-top:8px}
.repeat-card{background:#FFF3E0;border-radius:14px;padding:16px 18px;margin:16px;text-align:center;border:1.5px solid #FFE0B2}
.repeat-en{font-size:20px;font-weight:800;color:var(--pd);margin-bottom:6px;line-height:1.4}
.repeat-zh{font-size:13px;color:var(--tl);margin-bottom:10px}
.footer-note{text-align:center;font-size:13px;color:var(--tl);padding:28px 20px 20px;line-height:2}
.footer-note a{color:var(--p);text-decoration:none;font-weight:600}
.divider-title{display:flex;align-items:center;gap:8px;margin:24px 16px 0;font-size:12px;color:var(--tl);font-weight:600}
.divider-title::before,.divider-title::after{content:'';flex:1;height:1px;background:#F0E8DC}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">✨ 第024期</div>

    <span>🕐 约12分钟</span>
    <span>📖 适合1.5–2岁</span>
  </div>
</div>

<div class="nav-tabs">
  <span class="nav-tab class="active"" onclick="location.href='issue-024.html'">024</span>
  <span class="nav-tab" onclick="location.href='issue-025.html'">025</span>
  <span class="nav-tab" onclick="location.href='issue-026.html'">026</span>
</div>

<div class="intro-box">
  <p>👋 宝宝学英语，从日常生活开始！</p>
  <p>💡 每天10分钟，为宝宝种下英语的种子。</p>
</div>

<div id="content">

<div class="divider-title">🔤 字母认知</div>
<div class="alpha-box">
  <div class="alpha-letter">A</div>
  <div class="alpha-info"><button class="tts-btn" onclick="playAudio(null,'A',this)">🔊 点击听发音</button></div>
</div>

</div>

<div class="footer-note">

</div>

<script>
var _curAud=null;var AUDIO_CDNS=['https://baby-english-d7gb3dwij91d31020-1346728686.tcloudbaseapp.com/audio/','https://cdn.jsdelivr.net/gh/zhujieli/baby-english@main/audio/','https://raw.githubusercontent.com/zhujieli/baby-english/main/audio/'];var _cdnIdx=0;
function playAudio(src,text,btn){if(!src){speak(text,btn);return}if(_curAud){try{_curAud.pause();_curAud.currentTime=0}catch(e){}_curAud=null}var playing=document.querySelectorAll('.tts-btn.playing,.play-btn.playing');for(var i=0;i<playing.length;i++)playing[i].classList.remove('playing');_cdnIdx=0;tryCDN(AUDIO_CDNS[0],src,text,btn)}
function tryCDN(cdn,src,text,btn){var a=new Audio();a.preload='auto';var loaded=false;a.oncanplaythrough=function(){loaded=true;clearTimeout(timer);if(btn)btn.classList.add('playing');var p=a.play();if(p!==undefined)p.catch(function(){a.play()});_curAud=a};a.onplay=function(){if(btn)btn.classList.add('playing')};a.onended=function(){if(btn)btn.classList.remove('playing');_curAud=null};a.onerror=function(){clearTimeout(timer);if(btn)btn.classList.remove('playing');nextCDN(src,text,btn)};var timer=setTimeout(function(){if(!loaded){try{a.pause()}catch(e){}if(btn)btn.classList.remove('playing');nextCDN(src,text,btn)}},6000);a.src=cdn+src;a.load()}
function nextCDN(src,text,btn){_cdnIdx++;if(_cdnIdx<AUDIO_CDNS.length){tryCDN(AUDIO_CDNS[_cdnIdx],src,text,btn)}else{speak(text,btn)}}
function speak(text,btn){if(!('speechSynthesis' in window))return;window.speechSynthesis.cancel();var utt=new SpeechSynthesisUtterance(text);utt.lang='en-US';utt.rate=0.82;utt.pitch=1.1;if(btn)btn.classList.add('playing');utt.onend=utt.onerror=function(){if(btn)btn.classList.remove('playing')};window.speechSynthesis.speak(utt)}
</script>
</body>
