<title>宝宝英语启蒙 · 第014期 · 睡前时光</title>
<style>
:root{--c:#1E88E5;--bg:#F8F6F0;--card:#FFF;--text:#333;--sub:#666;--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',Arial,sans-serif;background:#1E88E511;color:var(--text);line-height:1.8;padding-bottom:90px;-webkit-font-smoothing:antialiased}
.hero{background:linear-gradient(135deg,#1E88E522,#1E88E544);padding:52px 24px 44px;text-align:center;position:relative;overflow:hidden;border-radius:0 0 40px 40px}
.hero::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:40px;background:#1E88E511;border-radius:50% 50% 0 0}
.hero-badge{display:inline-block;background:#1E88E5;color:#fff;font-size:12px;font-weight:700;padding:5px 18px;border-radius:20px;letter-spacing:1px}
.hero h1{font-size:30px;font-weight:800;color:#1E88E5;margin:14px 0 4px}
.hero-sub{font-size:17px;opacity:.8;font-weight:600;color:#1E88E5}
.hero-meta{display:flex;justify-content:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.hero-meta span{background:rgba(255,255,255,.7);padding:4px 14px;border-radius:14px;font-size:13px;color:#1E88E5}
.nav-tabs{display:flex;gap:6px;padding:20px 16px 6px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.nav-tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;border:2px solid #1E88E544;background:#fff;cursor:pointer;color:#1E88E5;transition:all .2s}
.tab.active{background:#1E88E5;color:#fff;border-color:#1E88E5}
.card{background:#1E88E511;margin:16px 16px;padding:22px 18px;border-radius:var(--r);border:1.5px solid #1E88E533;display:none}
.card.active{display:block}
.card-title{font-size:18px;font-weight:800;color:#1E88E5;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #1E88E544;display:flex;align-items:center;gap:8px}
.content p{margin:10px 0;font-size:15px;line-height:1.9}
.content h4{font-size:16px;font-weight:700;color:#1E88E5;margin:16px 0 8px;padding:6px 0;border-bottom:1px dashed #1E88E544}
.content blockquote{background:#1E88E522;border-left:4px solid #1E88E5;padding:12px 16px;border-radius:0 12px 12px 0;margin:14px 0;font-size:14px;line-height:1.85}
.content ul{list-style:none;margin:10px 0;padding:0}
.content li{padding:9px 0 9px 22px;position:relative;font-size:15px;border-bottom:1px solid #1E88E522}
.content li:last-child{border-bottom:none}
.content li::before{content:'•';position:absolute;left:6px;color:#1E88E5;font-weight:bold;font-size:18px;top:8px}
.content strong{color:#1E88E5}
.audio-btn{margin:4px 4px;padding:6px 14px;border:none;border-radius:20px;background:#FFF3E0;color:#E65100;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.audio-btn:hover{background:#FFE0B2;transform:scale(1.05)}
.audio-btn:active{transform:scale(0.95)}
.footer{display:flex;justify-content:space-between;padding:14px 16px;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid #1E88E533;z-index:100;gap:12px}
.footer a{flex:1;text-align:center;padding:13px;background:#1E88E5;color:#fff;border-radius:var(--r);font-weight:700;font-size:14px;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.footer .nav-btn{background:#fff;color:#1E88E5;border:2px solid #1E88E5}
.nav-disabled{opacity:.4;cursor:not-allowed}
</style>
<script>
var AUDIO_CDNS = [
    "https://baby-english-d7gb3dwij91d31020-1346728686.tcloudbaseapp.com/audio/",
    "https://cdn.jsdelivr.net/gh/zhujieli/baby-english@main/audio/",
    "https://raw.githubusercontent.com/zhujieli/baby-english/main/audio/"
];
var audioPlayer = null;
function playAudio(audioName) {
    if (audioPlayer) audioPlayer.pause();
    audioPlayer = new Audio();
    var cdnIndex = 0;
    audioPlayer.addEventListener('error', function() {
        cdnIndex++;
        if (cdnIndex < AUDIO_CDNS.length) {
            audioPlayer.src = AUDIO_CDNS[cdnIndex] + audioName + '.mp3';
            audioPlayer.play().catch(function() {});
        } else {
            if (window.speechSynthesis) {
                var utter = new SpeechSynthesisUtterance(audioName.replace(/_/g, ' '));
                utter.lang = 'en-US';
                utter.rate = 0.9;
                window.speechSynthesis.speak(utter);
            }
        }
    });
    audioPlayer.src = AUDIO_CDNS[cdnIndex] + audioName + '.mp3';
    audioPlayer.play().catch(function() {});
}
function showTab(id) {
    document.querySelectorAll('.card').forEach(function(e){e.classList.remove('active')});
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
    event.target.classList.add('active');
}
</script>
</head>

</html>
